anta.tests.connectivity:
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW402-SITE4-R.lab.example.com
      neighbor_port: Ethernet47
      port: Ethernet39
    result_overwrite:
      custom_field: 'Local: Ethernet39 - Remote: SW402-SITE4-R Ethernet47'
- VerifyReachability:
    hosts:
    - destination: 10.102.50.8
      repeat: 1
      source: 10.102.50.9
      vrf: default
    result_overwrite:
      custom_field: 'Source: P2P Interface Ethernet39 (IP: 10.102.50.9) - Destination:
        SW402-SITE4-R Ethernet47 (IP: 10.102.50.8)'
