anta.tests.connectivity:
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW102-SITE1-R.lab.example.com
      neighbor_port: Ethernet43
      port: Ethernet45
    result_overwrite:
      custom_field: 'Local: Ethernet45 - Remote: SW102-SITE1-R Ethernet43'
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW502-SITE5-R.lab.example.com
      neighbor_port: Ethernet39
      port: Ethernet47
    result_overwrite:
      custom_field: 'Local: Ethernet47 - Remote: SW502-SITE5-R Ethernet39'
- VerifyReachability:
    hosts:
    - destination: 10.102.50.6
      repeat: 1
      source: 10.102.50.7
      vrf: default
    result_overwrite:
      custom_field: 'Source: P2P Interface Ethernet45 (IP: 10.102.50.7) - Destination:
        SW102-SITE1-R Ethernet43 (IP: 10.102.50.6)'
