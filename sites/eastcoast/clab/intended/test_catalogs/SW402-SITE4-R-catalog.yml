anta.tests.hardware:
- VerifyEnvironmentPower:
    result_overwrite:
      custom_field: 'Accepted States: ''ok'''
    states:
    - ok
- VerifyEnvironmentCooling:
    result_overwrite:
      custom_field: 'Accepted States: ''ok'''
    states:
    - ok
- VerifyTemperature: null
- VerifyTransceiversManufacturers:
    manufacturers:
    - Arista Networks
    - Arastra, Inc.
    - Not Present
    result_overwrite:
      custom_field: 'Accepted Manufacturers: ''Arista Networks'', ''Arastra, Inc.'',
        ''Not Present'''
anta.tests.interfaces:
- VerifyInterfacesStatus:
    interfaces:
    - name: Ethernet45
      status: up
    result_overwrite:
      custom_field: Interface Ethernet45 - P2P_SW102-SITE1-R_Ethernet43 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Ethernet47
      status: up
    result_overwrite:
      custom_field: Interface Ethernet47 - P2P_SW502-SITE5-R_Ethernet39 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Vlan413
      status: up
    result_overwrite:
      custom_field: Interface Vlan413 - EdgeDeviceControlSite4 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Loopback0
      status: up
    result_overwrite:
      custom_field: Interface Loopback0 - ROUTER_ID = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Loopback1
      status: up
    result_overwrite:
      custom_field: Interface Loopback1 - VXLAN_TUNNEL_SOURCE = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Loopback10
      status: up
    result_overwrite:
      custom_field: Interface Loopback10 - INBAND_MGMT = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Vxlan1
      status: up
    result_overwrite:
      custom_field: Interface Vxlan1 = 'up'
anta.tests.routing.bgp:
- VerifyBGPSpecificPeers:
    address_families:
