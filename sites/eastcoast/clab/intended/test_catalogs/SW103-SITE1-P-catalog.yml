anta.tests.connectivity:
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW101-SITE1-B.lab.example.com
      neighbor_port: Ethernet56/1
      port: Ethernet53/1
    result_overwrite:
      custom_field: 'Local: Ethernet53/1 - Remote: SW101-SITE1-B Ethernet56/1'
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW102-SITE1-R.lab.example.com
      neighbor_port: Ethernet56/1
      port: Ethernet54/1
    result_overwrite:
      custom_field: 'Local: Ethernet54/1 - Remote: SW102-SITE1-R Ethernet56/1'
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: site1-server1
      neighbor_port: Ethernet3
      port: Ethernet50
    result_overwrite:
      custom_field: 'Local: Ethernet50 - Remote: site1-server1 Ethernet3'
- VerifyReachability:
    hosts:
    - destination: 10.11.50.8
      repeat: 1
      source: 10.11.50.9
      vrf: default
    result_overwrite:
      custom_field: 'Source: P2P Interface Ethernet53/1 (IP: 10.11.50.9) - Destination:
        SW101-SITE1-B Ethernet56/1 (IP: 10.11.50.8)'
- VerifyReachability:
    hosts:
    - destination: 10.11.50.10
      repeat: 1
      source: 10.11.50.11
      vrf: default
    result_overwrite:
      custom_field: 'Source: P2P Interface Ethernet54/1 (IP: 10.11.50.11) - Destination:
