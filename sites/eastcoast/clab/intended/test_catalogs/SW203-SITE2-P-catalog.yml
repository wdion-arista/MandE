anta.tests.connectivity:
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW201-SITE2-B.lab.example.com
      neighbor_port: Ethernet56/1
      port: Ethernet53/1
    result_overwrite:
      custom_field: 'Local: Ethernet53/1 - Remote: SW201-SITE2-B Ethernet56/1'
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW202-SITE2-R.lab.example.com
      neighbor_port: Ethernet56/1
      port: Ethernet54/1
    result_overwrite:
      custom_field: 'Local: Ethernet54/1 - Remote: SW202-SITE2-R Ethernet56/1'
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: site2-server1
      neighbor_port: Ethernet3
      port: Ethernet50
    result_overwrite:
      custom_field: 'Local: Ethernet50 - Remote: site2-server1 Ethernet3'
- VerifyReachability:
    hosts:
    - destination: 10.11.50.12
      repeat: 1
      source: 10.11.50.13
      vrf: default
    result_overwrite:
      custom_field: 'Source: P2P Interface Ethernet53/1 (IP: 10.11.50.13) - Destination:
        SW201-SITE2-B Ethernet56/1 (IP: 10.11.50.12)'
- VerifyReachability:
    hosts:
    - destination: 10.11.50.14
      repeat: 1
      source: 10.11.50.15
      vrf: default
    result_overwrite:
      custom_field: 'Source: P2P Interface Ethernet54/1 (IP: 10.11.50.15) - Destination:
