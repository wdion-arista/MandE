anta.tests.connectivity:
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW101-SITE1-B.lab.example.com
      neighbor_port: Ethernet47
      port: Ethernet47
    result_overwrite:
      custom_field: 'Local: Ethernet47 - Remote: SW101-SITE1-B Ethernet47'
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW203-SITE2-P.lab.example.com
      neighbor_port: Ethernet53/1
      port: Ethernet56/1
    result_overwrite:
      custom_field: 'Local: Ethernet56/1 - Remote: SW203-SITE2-P Ethernet53/1'
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: site2-server1
      neighbor_port: Ethernet1
      port: Ethernet50
    result_overwrite:
      custom_field: 'Local: Ethernet50 - Remote: site2-server1 Ethernet1'
- VerifyReachability:
    hosts:
    - destination: 10.101.50.4
      repeat: 1
      source: 10.101.50.5
      vrf: default
    result_overwrite:
      custom_field: 'Source: P2P Interface Ethernet47 (IP: 10.101.50.5) - Destination:
        SW101-SITE1-B Ethernet47 (IP: 10.101.50.4)'
- VerifyReachability:
    hosts:
    - destination: 10.11.50.13
      repeat: 1
      source: 10.11.50.12
      vrf: default
    result_overwrite:
      custom_field: 'Source: P2P Interface Ethernet56/1 (IP: 10.11.50.12) - Destination:
