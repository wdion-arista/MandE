anta.tests.connectivity:
- VerifyLLDPNeighbors:
    neighbors:
    - neighbor_device: SW401-SITE4-B.lab.example.com
      neighbor_port: Ethernet45
      port: Ethernet43
    result_overwrite:
      custom_field: 'Local: Ethernet43 - Remote: SW401-SITE4-B Ethernet45'
