              - subnet: 10.3.35.0/24
                name: SRT Blue
                default_gateway: 10.3.35.1
                ranges:
                  - start: 10.3.35.10
                    end: 10.3.35.250
              - subnet: 10.3.36.0/24
                name: SRT Red
                default_gateway: 10.3.36.1
