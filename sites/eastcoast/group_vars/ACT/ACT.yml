mgmt_cidr: 24
root_dir: '{{ inventory_dir }}/act'
mgmt_gateway: 192.168.0.6
fabric_name: ACT


aaa_root:
  disabled: true

avd_digital_twin_mode: true

# platform_clab_type: cEOSLab
generate_cv_tags:
  topology_hints: true
  campus_fabric: true
  device_tags:
    - name: environment
      value: ACT
    - name: device_model
      data_path: metadata.platform
        
platform_settings:
  - platforms:
      - 7280R3
      - 7280SR3
    reload_delay:
      mlag: 900
      non_mlag: 1020
    tcam_profile: vxlan-routing
    feature_support:
      evpn_gateway_all_active_multihoming: true
      private_vlan: false
    digital_twin:
      platform: 7280R3
      act_node_type: veos 

  - platforms:
      - 7280R
      - 7280R2
      - 7020R
      - 7020TD
    lag_hardware_only: true
    reload_delay:
      mlag: 900
      non_mlag: 1020
    tcam_profile: vxlan-routing
    feature_support:
      private_vlan: false
    digital_twin:
      platform: 7280R
      act_node_type: veos 

  - platforms:
      - CEOS
      - cEOS
      - ceos
      - cEOSLab
    feature_support:
      bgp_update_wait_for_convergence: false
      bgp_update_wait_install: false
      interface_storm_control: false
      queue_monitor_length_notify: false
      evpn_gateway_all_active_multihoming: true
    management_interface: Management0
    reload_delay:
      mlag: 300
      non_mlag: 330
    digital_twin:
      act_node_type: veos

