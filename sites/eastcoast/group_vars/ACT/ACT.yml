### VRF Specific

# This is used to build the Terninattr daemon
daemon_terminattr:
  clusters:
    # - name: OnPrem
    #   cvaddrs:
    #     - 192.168.0.5:9910
    #   cvauth:
    #     method: "token"
    #     token_file: "/tmp/token"
    #   cvvrf: default
    #   # cvsourceintf: Management1
    - name: CVaaS
      cvaddrs:
        - apiserver.arista.io:443
      cvauth:
        method: "token-secure"
        token_file: "/tmp/cv-onboarding-token"
        #method: certs
        #key_file: /persist/secure/ssl/terminattr/CVaaS/keys/client.key
        #cert_file: /persist/secure/ssl/terminattr/CVaaS/certs/client.crt
        # method: certs
        # key_file: /persist/secure/ssl/terminattr/primary/keys/client.key
        # cert_file: /persist/secure/ssl/terminattr/primary/certs/client.crt

      cvvrf: MGMT
      cvsourceintf: Management1
    - name: CVaaS-wrdion
      cvaddrs:
        - apiserver.arista.io:443
      cvauth:
        method: "token-secure"
        token_file: "/tmp/cv-onboarding-token-wrdion"
        #method: certs
        #key_file: /persist/secure/ssl/terminattr/CVaaS/keys/client.key
        #cert_file: /persist/secure/ssl/terminattr/CVaaS/certs/client.crt
        # method: certs
        # key_file: /persist/secure/ssl/terminattr/primary/keys/client.key
        # cert_file: /persist/secure/ssl/terminattr/primary/certs/client.crt

      cvvrf: default
      cvsourceintf: Vlan11      
  disable_aaa: true
  #smashexcludes: "ale,flexCounter,hardware,kni,pulse,strata"
  smashexcludes: "ale,flexCounter,kni,pulse,strata"
  ingestexclude: "/Sysdb/cell/1/agent,/Sysdb/cell/2/agent"

### NTP Servers ###
ntp:
  servers:
    - name: 216.232.132.95
      vrf: MGMT
    - name: 23.133.168.244
      vrf: MGMT

# DNS Server
ip_name_servers:
  - ip_address: 8.8.8.8
    vrf: MGMT
  - ip_address: 4.2.2.1
    vrf: MGMT

  - ip_address: 8.8.8.8
    vrf: Production
  - ip_address: 4.2.2.1
    vrf: Production      