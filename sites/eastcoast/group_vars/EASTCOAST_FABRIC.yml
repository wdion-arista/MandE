---
# Fabric name
# fabric_name: EASTCOAST_FABRIC

evpn_l3_multicast: true
# evpn_multicast: true
underlay_multicast: true
igmp_snooping_enabled : true
default_igmp_snooping_enabled: true
# topology_hint_datacenter: MandE
# Set Design Type to l3ls-evpn
design:
  type: l3ls-evpn

underlay_routing_protocol: isis
overlay_routing_protocol: ebgp

digital_twin:

  # Targeted Digital Twin environment.
  environment: act
  fabric:
    act_username: cvpadmin2
    act_password: blabla


