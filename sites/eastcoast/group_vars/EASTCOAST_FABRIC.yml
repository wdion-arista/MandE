eos_designs_documentation:
  topology_csv: true
  p2p_links_csv: true

### Management console ###
management_console:
  idle_timeout: 300

management_ssh:
  idle_timeout: 60
  connection:
    limit: 5


### DNS Domain ###
dns_domain: lab.example.com

# Common settings
load_interval:
  default: 30

clock:
  timezone: Canada/Eastern

# ### NTP Servers ###
# ntp:
#   servers:
