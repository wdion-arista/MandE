---
# Credentials for CVP and EOS Switches
ansible_user: cvpadmin
ansible_password: "{{ lookup('env', 'LABPASSPHRASE') }}"

#ceos local default config user
# ansible_user: arista
# ansible_password: "arista"

ansible_network_os: arista.eos.eos
# Configure privilege escalation
ansible_become: true
ansible_become_method: enable
# HTTPAPI configuration
ansible_connection: httpapi
ansible_httpapi_port: 443
ansible_httpapi_use_ssl: true
ansible_httpapi_validate_certs: false
ansible_python_interpreter: $(which python3)
avd_data_validation_mode: error

ansible_diff_mode: network

# # arista.avd.cv_deploy role parameters
# cv_token: # Fill in here with a CloudVision Service Account Token
# cv_server: cvp
# cv_verify_certs: false

# Local Users
local_users:
  - name: "{{ ansible_user }}"
    privilege: 15
    role: network-admin
    sha512_password: "{{ ansible_password | password_hash('sha512', salt='arista', rounds=5000) }}"
    # ssh_key: "{{ lookup('ansible.builtin.first_found', dict(files=['id_ed25519.pub', 'id_ecdsa.pub', 'id_rsa.pub'], paths=[lookup('env', 'HOME') + '/.ssh/'])) }}"
    ssh_key: "{{ lookup('ansible.builtin.file', lookup('ansible.builtin.first_found', dict(files=['id_ed25519.pub', 'id_ecdsa.pub', 'id_rsa.pub'], paths=[lookup('env', 'HOME') + '/.ssh/']))) }}"
  - name: "admin"
    privilege: 15
    role: network-admin
    sha512_password: "{{ ansible_password | password_hash('sha512', salt='arista', rounds=5000) }}"
    # ssh_key: "{{ lookup('ansible.builtin.first_found', dict(files=['id_ed25519.pub', 'id_ecdsa.pub', 'id_rsa.pub'], paths=[lookup('env', 'HOME') + '/.ssh/'])) }}"
    ssh_key: "{{ lookup('ansible.builtin.file', lookup('ansible.builtin.first_found', dict(files=['id_ed25519.pub', 'id_ecdsa.pub', 'id_rsa.pub'], paths=[lookup('env', 'HOME') + '/.ssh/']))) }}"    
  - name: service
    sha512_password: "{{ ansible_password | password_hash('sha512', salt='arista', rounds=5000) }}"
    shell: /bin/bash
  - name: pcapper
    shell: /bin/bash
    sha512_password: "{{ ansible_password | password_hash('sha512', salt='arista', rounds=5000) }}"
    ssh_key: "{{ lookup('ansible.builtin.file', lookup('ansible.builtin.first_found', dict(files=['id_ed25519.pub', 'id_ecdsa.pub', 'id_rsa.pub'], paths=[lookup('env', 'HOME') + '/.ssh/']))) }}"

# AAA
aaa_authorization:
  exec:
    default: local

# # OOB Management network default gateway.
# mgmt_gateway: 192.168.2.1
mgmt_interface_vrf: default

# Common settings
load_interval:
  default: 30

management_api_http:
  enable_http: false
  enable_https: true
  enable_vrfs:
    - name: default


